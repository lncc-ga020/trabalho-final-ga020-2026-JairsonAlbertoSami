name: Publish PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Validate tag matches pyproject version
        if: github.event_name == 'push'
        shell: bash
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          tag = "${{ github.ref_name }}"
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Tag/version mismatch: got {tag!r}, expected {expected!r}")
          print(f"Validated release tag {tag} against pyproject version {version}")
          PY

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke-test wheel install
        shell: bash
        run: |
          python -m venv .venv-smoke
          source .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import voids; print(voids.__version__)"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/project/voids/
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
