<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 430" width="1400" height="430" role="img" aria-labelledby="title desc">
  <title id="title">Pore-throat-pore conduit decomposition</title>
  <desc id="desc">Adapted schematic of the Valvatne-Blunt conduit decomposition showing pore-center pressures, conductance segments, and the three conduit sub-lengths between pore centers.</desc>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#222"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .pore { fill: #f2f2f2; stroke: #222; stroke-width: 4; }
      .throat { fill: none; stroke: #222; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .centerline { stroke: #222; stroke-width: 4; }
      .tick { stroke: #222; stroke-width: 3; }
      .measure { stroke: #222; stroke-width: 3; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
      .text { font: 700 28px 'Times New Roman', 'DejaVu Serif', serif; fill: #222; text-anchor: middle; }
      .small { font: 700 24px 'Times New Roman', 'DejaVu Serif', serif; fill: #222; text-anchor: middle; }
      .caption { font: 700 22px 'Times New Roman', 'DejaVu Serif', serif; fill: #222; text-anchor: middle; }
      .formula { font: 700 30px 'Times New Roman', 'DejaVu Serif', serif; fill: #222; text-anchor: middle; }
      .sub { font-size: 68%; baseline-shift: sub; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="430"/>

  <circle class="pore" cx="250" cy="170" r="96"/>
  <circle class="pore" cx="1150" cy="170" r="96"/>

  <line class="centerline" x1="250" y1="170" x2="1150" y2="170"/>
  <line class="tick" x1="490" y1="156" x2="490" y2="184"/>
  <line class="tick" x1="910" y1="156" x2="910" y2="184"/>

  <path class="throat" d="M490 170
    C520 170, 520 140, 550 140
    L850 140
    C880 140, 880 170, 910 170"/>

  <text class="text" x="250" y="104">i</text>
  <text class="text" x="1150" y="104">j</text>
  <text class="text" x="250" y="186">P<tspan class="sub">p,i</tspan></text>
  <text class="text" x="1150" y="186">P<tspan class="sub">p,j</tspan></text>

  <text class="small" x="370" y="156">g<tspan class="sub">p,i</tspan></text>
  <text class="small" x="700" y="132">g<tspan class="sub">t</tspan></text>
  <text class="small" x="1030" y="156">g<tspan class="sub">p,j</tspan></text>

  <line class="measure" x1="252" y1="202" x2="488" y2="202"/>
  <line class="measure" x1="492" y1="202" x2="908" y2="202"/>
  <line class="measure" x1="912" y1="202" x2="1148" y2="202"/>
  <text class="small" x="370" y="230">L<tspan class="sub">p,i</tspan></text>
  <text class="small" x="700" y="230">L<tspan class="sub">t</tspan></text>
  <text class="small" x="1030" y="230">L<tspan class="sub">p,j</tspan></text>

  <line class="measure" x1="252" y1="258" x2="1148" y2="258"/>
  <text class="small" x="700" y="286">L<tspan class="sub">ij</tspan></text>

  <text class="caption" x="250" y="328">center i</text>
  <text class="caption" x="490" y="328">split i</text>
  <text class="caption" x="700" y="328">throat core</text>
  <text class="caption" x="910" y="328">split j</text>
  <text class="caption" x="1150" y="328">center j</text>

  <text class="formula" x="700" y="392">
    L<tspan class="sub">ij</tspan> / g<tspan class="sub">ij</tspan> = L<tspan class="sub">p,i</tspan> / g<tspan class="sub">p,i</tspan> + L<tspan class="sub">t</tspan> / g<tspan class="sub">t</tspan> + L<tspan class="sub">p,j</tspan> / g<tspan class="sub">p,j</tspan>
  </text>
</svg>
